<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiscoverSwiss Suche</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

  <header class="page-header">
    <h1>DiscoverSwiss Suche</h1>
    <p>Objekte via Search API suchen und zur Detailansicht öffnen.</p>
    <p><a href="index.html">Zur Objektansicht</a> · <a href="settings.html">Zu Einstellungen</a></p>
  </header>

  <main class="layout" aria-label="Discover Swiss Suche">
    <section class="panel controls" aria-label="Suchformular und Konfiguration">
      <h2>Gespeicherte Konfigurationen</h2>
      <div class="stack compact">
        <label for="configSelect">Aktive Konfiguration</label>
        <select id="configSelect" aria-label="Gespeicherte Konfigurationen"></select>
      </div>

      <hr>

      <h2>Suche</h2>
      <form id="searchForm" class="stack" novalidate>
        <label for="searchInput">Suchtext</label>
        <input
          id="searchInput"
          name="searchInput"
          type="text"
          placeholder="z. B. Hotel Elmer"
        >

        <label for="languageInput">Sprache (optional, überschreibt Konfiguration)</label>
        <input
          id="languageInput"
          name="languageInput"
          type="text"
          placeholder="z. B. de, en, fr"
          aria-label="Sprache für API Anfrage"
        >

        <label for="resultsPerPageInput">Results Per Page</label>
        <input
          id="resultsPerPageInput"
          name="resultsPerPageInput"
          type="number"
          min="1"
          step="1"
          value="10"
          placeholder="z. B. 100"
          aria-label="Anzahl Resultate pro Seite"
        >

        <label for="viewSelect">View (optional)</label>
        <select
          id="viewSelect"
          name="viewSelect"
          aria-label="Search View Auswahl"
        >
          <option value="">Keine View</option>
        </select>

        <label for="publishCheckbox">Publish aktivieren (publish=true)</label>
        <input
          id="publishCheckbox"
          name="publishCheckbox"
          type="checkbox"
          aria-label="Publish true für Search API"
        >

        <label for="identifierInput">Identifier (optional, mehrere IDs)</label>
        <textarea
          id="identifierInput"
          name="identifierInput"
          rows="4"
          placeholder="z. B. tou_4kq_bhgdcfdb, log_x8_cabca"
          aria-label="Identifier für OData Filter"
        ></textarea>

        <button type="submit" id="searchButton">Suchen</button>
      </form>

      <div id="status" class="status" role="status" aria-live="polite">Bereit</div>
    </section>

    <section class="panel results" aria-label="Suchergebnisse">
      <article class="card">
        <div class="stack compact">
          <label for="searchQueryUrl">Search Query URL</label>
          <div class="query-url-row">
            <input
              id="searchQueryUrl"
              type="text"
              readonly
              placeholder="Noch keine Suche ausgeführt."
              aria-label="Search Query URL"
            >
            <button type="button" id="copyQueryUrlButton" class="ghost" disabled>URL kopieren</button>
          </div>
        </div>
      </article>

      <div class="result-head">
        <h2>Ergebnisse</h2>
        <div class="button-row">
          <p id="resultCount" class="muted">Noch keine Suche ausgeführt.</p>
          <button type="button" id="openJsonButton" class="ghost" disabled>JSON im Popup öffnen</button>
        </div>
      </div>

      <article class="card">
        <ul id="resultsList" class="list" aria-live="polite">
          <li class="muted">Noch keine Daten geladen.</li>
        </ul>
      </article>
    </section>
  </main>

  <dialog id="jsonDialog" aria-label="JSON Daten im Popup">
    <form method="dialog" class="dialog-header">
      <h3>JSON Ausgabe</h3>
      <button>Schliessen</button>
    </form>
    <pre id="jsonOutput"></pre>
  </dialog>

  <script type="module" src="src/search.js"></script>
</body>
</html>
