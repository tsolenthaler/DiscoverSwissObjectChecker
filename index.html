<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiscoverSwissCheckData</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

  <header class="page-header">
    <h1>DiscoverSwissCheckData</h1>
    <p>Objektdaten aus der discover.swiss Info API schnell prüfen und vergleichen.</p>
    <p><a href="search.html">Zur Suche</a> · <a href="settings.html">Zu Einstellungen</a></p>
  </header>

  <main class="layout" aria-label="Discover Swiss Objektprüfung">
    <section class="panel controls" aria-label="Suche und Konfiguration">
      <h2>Gespeicherte Konfigurationen</h2>
      <div class="stack compact">
        <label for="configSelect">Aktive Konfiguration</label>
        <select id="configSelect" aria-label="Gespeicherte Konfigurationen"></select>
      </div>

      <hr>

      <h2>Suche</h2>
      <form id="searchForm" class="stack" novalidate>
        <label for="objectInput">Objekt-ID oder Pfad</label>
        <input
          id="objectInput"
          name="objectInput"
          type="text"
          placeholder="z. B. log_s9t_... oder /lodgingbusinesses/log_s9t_..."
          required
          aria-required="true"
        >

        <label for="endpointOverride">Endpoint (optional, bei unklarer ID)</label>
        <select id="endpointOverride" name="endpointOverride" aria-label="Endpoint manuell waehlen">
          <option value="">Automatisch erkennen</option>
        </select>

        <label for="scopeInput">Scope (optional)</label>
        <input
          id="scopeInput"
          name="scopeInput"
          type="text"
          placeholder="z. B. mice"
          aria-label="Scope für API Anfrage"
        >

        <label for="languageInput">Sprache (optional, überschreibt Konfiguration)</label>
        <input
          id="languageInput"
          name="languageInput"
          type="text"
          placeholder="z. B. de, en, fr"
          aria-label="Sprache für API Anfrage"
        >

        <button type="submit" id="fetchButton">Daten abrufen</button>
      </form>

      <div id="status" class="status" role="status" aria-live="polite">Bereit</div>
    </section>

    <section class="panel results" aria-label="Ergebnisbereich">
      <article class="card">
        <div class="stack compact">
          <label for="queryUrl">Query URL</label>
          <div class="query-url-row">
            <input
              id="queryUrl"
              type="text"
              readonly
              placeholder="Noch keine Daten abgerufen."
              aria-label="Query URL"
            >
            <button type="button" id="copyQueryUrlButton" class="ghost" disabled>URL kopieren</button>
          </div>
        </div>
      </article>

      <div class="result-head">
        <h2>Ergebnis</h2>
        <div class="button-row">
          <button type="button" id="openJsonButton" class="ghost" disabled>JSON im Popup öffnen</button>
          <button type="button" id="copyJsonButton" class="ghost" disabled>JSON in Zwischenablage kopieren</button>
        </div>
      </div>

      <div class="tabs" role="tablist" aria-label="Ergebnis Tabs">
        <button type="button" class="tab-button active" role="tab" aria-selected="true" data-tab="meta">Objekt-Metadaten</button>
        <button type="button" class="tab-button" role="tab" aria-selected="false" data-tab="description">Beschreibung</button>
        <button type="button" class="tab-button" role="tab" aria-selected="false" data-tab="media">Medien</button>
        <button type="button" class="tab-button" role="tab" aria-selected="false" data-tab="accommodation">Accommodation</button>
        <button type="button" class="tab-button" role="tab" aria-selected="false" data-tab="links">Links</button>
        <button type="button" class="tab-button" role="tab" aria-selected="false" data-tab="potentialAction">Potential Action</button>
      </div>

      <article class="card tab-panel active" data-panel="meta">
        <h3>Objekt-Metadaten</h3>
        <dl id="objectMeta" class="meta-grid"></dl>
      </article>

      <article class="card tab-panel" data-panel="description">
        <h3>Beschreibung</h3>
        <div id="descriptionSection"></div>
      </article>

      <article class="card tab-panel" data-panel="media">
        <h3>Medien</h3>
        <div id="mediaSection"></div>
      </article>

      <article class="card tab-panel" data-panel="accommodation">
        <h3>Accommodation</h3>
        <div id="accommodationSection"></div>
      </article>

      <article class="card tab-panel" data-panel="links">
        <h3>Links</h3>
        <div id="linksSection"></div>
      </article>

      <article class="card tab-panel" data-panel="potentialAction">
        <h3>Potential Action</h3>
        <div id="potentialActionSection"></div>
      </article>
    </section>
  </main>

  <dialog id="jsonDialog" aria-label="JSON Daten im Popup">
    <form method="dialog" class="dialog-header">
      <h3>JSON Ausgabe</h3>
      <button>Schliessen</button>
    </form>
    <pre id="jsonOutput"></pre>
  </dialog>

  <script type="module" src="src/main.js"></script>
</body>
</html>
